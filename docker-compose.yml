services:
  db:
    image: postgres:16-alpine
    container_name: rcg-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: rcgcrm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    container_name: rcg-cache
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: rcg-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=admin
      - DB_DATABASE=rcgcrm
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - JWT_SECRET=super-secret-key-rcg-crm
    depends_on:
      - db
      - cache

  frontend:
    build: ./frontend
    container_name: rcg-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:

