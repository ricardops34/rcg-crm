version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=rcgcrm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - network_db
    ports:
      - "5432:5432"
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    networks:
      - network_db
    ports:
      - "6379:6379"
    deploy:
      restart_policy:
        condition: on-failure

  rcg-api:
    image: bjsoftware/rcg-backend:latest
    networks:
      - network_db
      - network_public
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=admin
      - DB_DATABASE=rcgcrm
      - DB_SYNC=true
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_SEED=${DB_SEED:-false}
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rcg-api.rule=Host(`crmapi.bjsoft.com.br`)"
        - "traefik.http.routers.rcg-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.rcg-api.middlewares=sslheader@swarm"
        - "traefik.http.routers.rcg-api.entrypoints=websecure"
        - "traefik.http.services.rcg-api.loadbalancer.server.port=3000"
        - "traefik.docker.network=network_public"

  rcg-web:
    image: bjsoftware/rcg-frontend:latest
    networks:
      - network_public
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rcg-web.rule=Host(`crm.bjsoft.com.br`) || HostRegexp(`{subdomain:[a-z0-9]+}.crm.bjsoft.com.br`)"
        - "traefik.http.routers.rcg-web.entrypoints=websecure"
        - "traefik.http.routers.rcg-web.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.rcg-web.middlewares=sslheader@swarm"
        - "traefik.http.services.rcg-web.loadbalancer.server.port=80"
        - "traefik.docker.network=network_public"

networks:
  network_db:
    driver: overlay
  network_public:
    external: true

volumes:
  postgres_data:


