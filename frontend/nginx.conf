server {
    listen 80;
    server_name localhost;

    # AJUSTE 1: Definição do document root no nível global do 'server'.
    # Isso garante que todas as diretivas de location (incluindo as de arquivos estáticos)
    # herdem o caminho correto '/usr/share/nginx/html' e evita fallbacks incorretos.
    root /usr/share/nginx/html;

    # AJUSTE 2: Configuração de SPA (Single Page Application) e controle de cache do index.html.
    location / {
        index index.html index.htm;
        # Habilita o roteamento HTML5 do Angular (redireciona rotas inexistentes fisicamente para o index.html)
        try_files $uri $uri/ /index.html;
        
        # Evita o cacheamento do index.html no navegador ou proxies (CDN).
        # Essencial para garantir que quando houver um novo deploy, o usuário carregue
        # imediatamente o novo index.html apontando para as novas versões/hashes dos scripts JS/CSS.
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # AJUSTE 3: Controle agressivo de cache para assets estáticos.
    # Como o Angular gera hashes exclusivos para os arquivos JS, CSS, fontes e imagens
    # (ex: main-TRZGIGX6.js), eles são imutáveis e podem ser cacheados permanentemente.
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        # Cache público de longa duração (6 meses) com flag 'immutable' de alta performance.
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        # Opcional: herda o root definido no nível do server
    }
}

