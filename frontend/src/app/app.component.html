@if (authService.isAuthenticated() && !isLoginPage) {
  <div class="po-wrapper">

    <po-header [p-brand]="headerBrand" [p-actions-tools]="headerActionTools" [p-header-user]="headerUser"
      [p-side-menu-only-action]="true">
    </po-header>

    <po-menu [p-collapsed]="true" [p-menus]="menuItems" [p-filter]="true" [p-automatic-toggle]="true">
    </po-menu>

    <router-outlet></router-outlet>

    <!-- Âncora invisível posicionada abaixo do botão de tema no header -->
    <span #themeAnchor class="theme-popup-anchor"></span>
    <po-popup
      #themePopup
      [p-target]="themeAnchor"
      [p-actions]="themeActions"
      p-position="bottom-left">
    </po-popup>

  </div>
} @else {
  <router-outlet></router-outlet>
}

<po-modal #modalUnit p-title="Trocar Unidade de Trabalho"
  [p-primary-action]="{ label: 'Confirmar Troca', action: confirmUnitSwitch.bind(this) }">
  <div class="po-row po-p-2">
    <po-info class="po-md-12 po-mb-3" p-label="Unidade Atual"
      [p-value]="authService.currentUser()?.unit?.name || 'Não informada'"></po-info>
    <po-select class="po-md-12" name="targetUnit" [ngModel]="selectedUnitId" (p-change)="selectedUnitId = $event"
      p-label="Selecione a Filial de Destino" [p-options]="allowedUnitOptions" p-required="true">
    </po-select>
  </div>
</po-modal>
