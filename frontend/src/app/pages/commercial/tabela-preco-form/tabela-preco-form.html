<po-page-edit 
  [p-title]="title"
  [p-breadcrumb]="breadcrumb"
  (p-save)="save()"
  (p-cancel)="cancel()"
  [p-disable-submit]="true">

  <po-loading-overlay [p-screen-lock]="true" *ngIf="isLoading"></po-loading-overlay>

  <form #formTabela="ngForm">
    
    <po-divider p-label="Definição da Tabela"></po-divider>
    <div class="po-row">
      <po-input class="po-md-2" name="codErp" [(ngModel)]="tabela.codErp" p-label="Cód. ERP" p-readonly></po-input>
      <po-input class="po-md-6" name="descricao" [(ngModel)]="tabela.descricao" p-label="Descrição da Tabela" p-readonly></po-input>
      <po-select class="po-md-2" name="status" [(ngModel)]="tabela.status" p-label="Status" [p-options]="[{label:'Ativa', value:'A'}, {label:'Inativa', value:'I'}]" p-readonly></po-select>
      <po-switch class="po-md-2" name="utiliza" [(ngModel)]="tabela.utiliza" p-label="Em Uso" p-label-off="Não" p-label-on="Sim" p-true-value="S" p-false-value="N" p-readonly></po-switch>
    </div>

    <div class="po-row">
      <po-datepicker class="po-md-3" name="dt_inicio" [(ngModel)]="tabela.dt_inicio" p-label="Data Início" p-readonly></po-datepicker>
      <po-datepicker class="po-md-3" name="dt_fim" [(ngModel)]="tabela.dt_fim" p-label="Data Fim" p-readonly></po-datepicker>
    </div>

    <po-divider p-label="Itens e Preços"></po-divider>
    <div class="po-row">
      <div class="po-md-12">
        <po-table [p-columns]="itemColumns" [p-items]="items" p-container="shadow"></po-table>
      </div>
    </div>

  </form>
</po-page-edit>
