<po-page-list 
  p-title="Carteira de Clientes"
  [p-breadcrumb]="breadcrumb"
  [p-actions]="pageActions"
  [p-filter]="filter">

  <po-table
    [p-loading]="isLoading"
    [p-loading-show-more]="loadingShowMore"
    [p-columns]="columns"
    [p-items]="items"
    [p-actions]="tableActions"
    [p-show-more-disabled]="!hasNext"
    (p-show-more)="showMore()"
    p-container="shadow"
    [p-striped]="true"
    [p-sort]="true">
  </po-table>

</po-page-list>
