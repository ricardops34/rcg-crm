<po-page-edit 
  [p-title]="title"
  [p-breadcrumb]="breadcrumb"
  (p-save)="save()"
  (p-cancel)="cancel()">

  <po-loading-overlay [p-screen-lock]="true" *ngIf="isLoading"></po-loading-overlay>

  <form #formCliente="ngForm">
    <po-tabs>
      <po-tab p-label="Identificação" [p-active]="true">
        <div class="po-row">
          <po-input class="po-md-2" name="codErp" [(ngModel)]="cliente.codErp" p-label="Cód. ERP" p-disabled="true"></po-input>
          <po-input class="po-md-6" name="razao" [(ngModel)]="cliente.razao" p-label="Razão Social" p-required="true" p-clean></po-input>
          <po-input class="po-md-4" name="fantasia" [(ngModel)]="cliente.fantasia" p-label="Nome Fantasia" p-clean></po-input>
        </div>
        <div class="po-row">
          <po-input class="po-md-3" name="cnpjCpf" [(ngModel)]="cliente.cnpjCpf" p-label="CNPJ/CPF" p-clean></po-input>
          <po-select class="po-md-2" name="status" [ngModel]="cliente.status" (p-change)="cliente.status = $event" p-label="Status"
            [p-options]="[{label: 'Ativo', value: 'A'}, {label: 'Bloqueado', value: 'B'}]">
          </po-select>          <po-input class="po-md-4" name="email" [(ngModel)]="cliente.email" p-label="E-mail" p-clean p-icon="po-icon-mail"></po-input>
        </div>
      </po-tab>

      <po-tab p-label="Endereço">
        <div class="po-row">
          <po-input class="po-md-2" name="cep" [(ngModel)]="cliente.cep" p-label="CEP" p-clean></po-input>
          <po-input class="po-md-5" name="endereco" [(ngModel)]="cliente.endereco" p-label="Logradouro" p-clean></po-input>
          <po-input class="po-md-3" name="bairro" [(ngModel)]="cliente.bairro" p-label="Bairro" p-clean></po-input>
          <po-input class="po-md-2" name="uf" [(ngModel)]="cliente.uf" p-label="UF" p-clean></po-input>
        </div>
        <div class="po-row">
          <po-input class="po-md-4" name="municipio" [(ngModel)]="cliente.municipio" p-label="Cidade" p-clean></po-input>
          <po-input class="po-md-8" name="complemento" [(ngModel)]="cliente.complemento" p-label="Complemento" p-clean></po-input>
        </div>
      </po-tab>

      <po-tab p-label="Financeiro">
        <div class="po-row">
          <po-number class="po-md-3" name="limite" [(ngModel)]="cliente.limite" p-label="Limite de Crédito" p-clean></po-number>
          <po-input class="po-md-2" name="risco" [(ngModel)]="cliente.risco" p-label="Risco" p-disabled="true"></po-input>
          <po-datepicker class="po-md-3" name="vencimentoLimite" [(ngModel)]="cliente.vencimentoLimite" p-label="Vencimento do Limite" p-clean></po-datepicker>
        </div>
        <div class="po-row">
          <po-textarea class="po-md-12" name="obsBloqueio" [(ngModel)]="cliente.obsBloqueio" p-label="Observações de Bloqueio" p-clean></po-textarea>
        </div>
      </po-tab>

      <po-tab p-label="Contatos">
        <po-table
          [p-items]="cliente.contatos"
          [p-columns]="contatoColumns"
          [p-actions]="contatoActions">
        </po-table>
        <div class="po-row">
          <po-button p-label="Adicionar Contato" (p-click)="addContato()" p-icon="po-icon-plus"></po-button>
        </div>
      </po-tab>
    </po-tabs>
  </form>
</po-page-edit>
