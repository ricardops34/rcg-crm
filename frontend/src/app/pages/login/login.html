<po-page-login p-title="CRM" p-background="assets/crm_login_bg.png" [p-logo]="loginLogo"
  [p-secondary-logo]="secondaryLoginLogo" [p-custom-field]="$any(loginUnitField)" [p-loading]="isLoading()"
  (p-login-change)="onLoginChange($event)" (p-login-submit)="loginSubmit($event)" [p-literals]="customLiterals">
</po-page-login>

<po-modal #modal2fa p-title="Autenticação de Dois Fatores"
  [p-primary-action]="{ label: 'Confirmar', action: confirm2fa.bind(this) }">
  <div class="po-row">
    <po-info p-label="Segurança"
      p-value="Informe o código de 6 dígitos enviado para seu e-mail ou gerado no app."></po-info>
    <po-input class="po-sm-12 po-md-12" name="2fa" [(ngModel)]="twoFactorCode" p-label="Código 2FA" p-mask="999999"></po-input>
  </div>
</po-modal>

<po-modal #modalChangePassword p-title="Troca de Senha Obrigatória"
  [p-primary-action]="{ label: 'Salvar Nova Senha', action: confirmChangePassword.bind(this), loading: isLoading() }">
  <div class="po-row">
    <po-info class="po-sm-12" p-label="Atenção"
      p-value="O administrador exige que você defina uma nova senha antes de continuar."></po-info>
    <po-password class="po-sm-12 po-md-6" name="newPassword" [(ngModel)]="newPassword"
      p-label="Nova Senha" p-required p-clean></po-password>
    <po-password class="po-sm-12 po-md-6" name="confirmNewPassword" [(ngModel)]="confirmNewPassword"
      p-label="Confirmar Nova Senha" p-required p-clean></po-password>
  </div>
</po-modal>

<po-modal #modalTerms p-title="Termos de Uso e LGPD"
  [p-primary-action]="{ label: 'Aceitar e Continuar', action: confirmTerms.bind(this), disabled: !termsAccepted }">
  <div class="po-row">
    <div class="po-sm-12 po-md-12">
      <p>Para continuar utilizando o RCG CRM, você deve ler e aceitar nossos novos Termos de Uso e Política de
        Privacidade (LGPD).</p>

      <div
        style="height: 250px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; background: #f9f9f9; font-size: 0.9rem; margin: 10px 0;"
        [innerHTML]="termsContent">
      </div>

      <po-checkbox name="termsAccepted" [(ngModel)]="termsAccepted"
        p-label="Eu li e concordo com os Termos de Uso e Política de Privacidade."></po-checkbox>

      <p style="font-size: 0.8rem; color: gray; margin-top: 5px;">Versão: {{ termsVersion }}</p>
    </div>
  </div>
</po-modal>
