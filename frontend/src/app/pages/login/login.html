<po-page-login
  p-title="RCG CRM"
  p-background="assets/login_crm.png"
  p-logo="assets/logo_rcg.png"
  [p-loading]="isLoading()"
  (p-login-submit)="loginSubmit($event)">
</po-page-login>

<po-modal #modal2fa p-title="Autenticação de Dois Fatores" [p-primary-action]="{ label: 'Confirmar', action: confirm2fa.bind(this) }">
  <div class="po-row">
    <po-info p-label="Segurança" p-value="Informe o código de 6 dígitos enviado para seu e-mail ou gerado no app."></po-info>
    <po-input class="po-md-12" name="2fa" [(ngModel)]="twoFactorCode" p-label="Código 2FA" p-mask="999999"></po-input>
  </div>
</po-modal>

<po-modal #modalTerms p-title="Termos de Uso e LGPD" [p-primary-action]="{ label: 'Aceitar e Continuar', action: confirmTerms.bind(this) }">
  <div class="po-row">
    <p>Para continuar utilizando o RCG CRM, você deve ler e aceitar nossos novos Termos de Uso e Política de Privacidade (LGPD).</p>
    <p style="font-size: 0.8rem; color: gray;">Última atualização: 19/05/2026</p>
  </div>
</po-modal>
