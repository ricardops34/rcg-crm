<po-page-default p-title="Configurador">
  <div class="builder-shell">
    <header class="builder-toolbar">
      <div class="screen-meta">
        <label>
          <span>Tela</span>
          <input type="text" [(ngModel)]="screenTitle" />
        </label>
        <label>
          <span>ID</span>
          <input type="text" [(ngModel)]="screenId" />
        </label>
      </div>
      <div class="toolbar-status">
        <span>{{ fields.length }} campos</span>
        <span>XML em memoria</span>
      </div>
    </header>

    <main class="builder-layout">
      <aside class="palette-panel">
        <div class="panel-title">
          <span>Componentes</span>
        </div>

        <div
          cdkDropList
          id="palette"
          class="palette-list"
          [cdkDropListData]="palette"
          [cdkDropListConnectedTo]="['canvas']">
          <button
            type="button"
            class="palette-item"
            *ngFor="let item of palette"
            cdkDrag>
            <i [className]="item.icon"></i>
            <span>{{ item.label }}</span>
          </button>
        </div>
      </aside>

      <section class="canvas-panel">
        <div class="panel-title">
          <span>Canvas</span>
          <small>Arraste campos para montar o formulario</small>
        </div>

        <div
          cdkDropList
          id="canvas"
          class="canvas-list"
          [cdkDropListData]="fields"
          [cdkDropListConnectedTo]="['palette']"
          (cdkDropListDropped)="dropField($event)">
          <button
            type="button"
            class="canvas-field"
            *ngFor="let field of fields"
            cdkDrag
            [class.selected]="field.id === selectedFieldId"
            [style.grid-column]="'span ' + field.gridMd"
            (click)="selectField(field)">
            <span class="field-label">{{ field.label }}</span>
            <span class="field-meta">{{ field.property }} · {{ field.type }}</span>
            <span class="field-required" *ngIf="field.required">Obrigatorio</span>
          </button>

          <div class="empty-canvas" *ngIf="fields.length === 0">
            Arraste componentes para iniciar a tela.
          </div>
        </div>
      </section>

      <aside class="properties-panel">
        <div class="panel-title">
          <span>Propriedades</span>
        </div>

        <ng-container *ngIf="selectedField as field; else noSelection">
          <label class="property-control">
            <span>Label</span>
            <input type="text" [(ngModel)]="field.label" />
          </label>

          <label class="property-control">
            <span>Propriedade</span>
            <input type="text" [(ngModel)]="field.property" />
          </label>

          <label class="property-control">
            <span>Tipo</span>
            <select [ngModel]="field.type" (ngModelChange)="updateType($event)">
              <option *ngFor="let type of fieldTypes" [ngValue]="type.value">{{ type.label }}</option>
            </select>
          </label>

          <label class="property-control">
            <span>Colunas MD</span>
            <select [ngModel]="field.gridMd" (ngModelChange)="updateGrid($event)">
              <option *ngFor="let option of gridOptions" [ngValue]="option">{{ option }}</option>
            </select>
          </label>

          <label class="property-control">
            <span>Mascara</span>
            <input type="text" [(ngModel)]="field.mask" placeholder="Ex: 99.999.999/9999-99" />
          </label>

          <label class="property-control">
            <span>Placeholder</span>
            <input type="text" [(ngModel)]="field.placeholder" />
          </label>

          <label class="check-control">
            <input type="checkbox" [(ngModel)]="field.required" />
            <span>Campo obrigatorio</span>
          </label>

          <div class="property-actions">
            <button type="button" class="secondary-action" (click)="duplicateSelectedField()">
              Duplicar
            </button>
            <button type="button" class="danger-action" (click)="removeSelectedField()">
              Remover
            </button>
          </div>
        </ng-container>

        <ng-template #noSelection>
          <p class="empty-properties">Selecione um campo no canvas.</p>
        </ng-template>
      </aside>
    </main>

    <section class="output-layout">
      <div class="preview-panel">
        <div class="panel-title">
          <span>Preview PO UI</span>
        </div>

        <div class="preview-form">
          <div
            class="preview-field"
            *ngFor="let field of fields"
            [style.grid-column]="'span ' + field.gridMd">
            <label>
              {{ field.label }}
              <strong *ngIf="field.required">*</strong>
            </label>
            <textarea *ngIf="field.type === 'textarea'" [placeholder]="field.placeholder"></textarea>
            <select *ngIf="field.type === 'select'">
              <option>Opcao exemplo</option>
            </select>
            <input *ngIf="field.type !== 'textarea' && field.type !== 'select' && field.type !== 'boolean'" [type]="field.type === 'date' ? 'date' : field.type === 'number' ? 'number' : 'text'" [placeholder]="field.placeholder" />
            <input *ngIf="field.type === 'boolean'" type="checkbox" />
          </div>
        </div>
      </div>

      <div class="xml-panel">
        <div class="panel-title">
          <span>XML gerado</span>
        </div>
        <pre>{{ generatedXml }}</pre>
      </div>
    </section>
  </div>
</po-page-default>
