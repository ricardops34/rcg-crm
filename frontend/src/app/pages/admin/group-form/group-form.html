<po-page-edit 
  [p-title]="title"
  [p-breadcrumb]="breadcrumb"
  (p-save)="save()"
  (p-cancel)="cancel()">
  
  <po-loading-overlay [p-screen-lock]="true" *ngIf="isLoading"></po-loading-overlay>

  <form #groupForm="ngForm">
    <po-divider p-label="Dados do Perfil"></po-divider>
    <div class="po-row">
      <po-input class="po-md-6" name="name" [(ngModel)]="group.name" p-label="Nome do Perfil" p-required p-clean></po-input>
      <po-select 
        class="po-md-6" 
        name="role" 
        [ngModel]="group.role" 
        (p-change)="group.role = $event"
        p-label="Tipo de Acesso (Behavior)" 
        [p-options]="roleOptions"
        p-required="true">
      </po-select>
    </div>

    <po-divider p-label="Rotinas e Permissões"></po-divider>
    
    <div class="po-row">
      <div class="po-md-12">
        <p class="po-font-text-smaller po-mb-2 po-text-color-07">
          Selecione as rotinas que este perfil pode acessar e o nível de permissão (CRUD).
        </p>
        
        <po-table 
          [p-columns]="columns" 
          [p-items]="allPrograms"
          p-container="shadow"
          [p-striped]="true">

          <ng-template po-table-column-template [p-property]="'view'" let-value let-row="row">
            <po-checkbox name="view_{{row.id}}" [(ngModel)]="row.view" p-label=" "></po-checkbox>
          </ng-template>

          <ng-template po-table-column-template [p-property]="'insert'" let-value let-row="row">
            <po-checkbox name="insert_{{row.id}}" [(ngModel)]="row.insert" p-label=" "></po-checkbox>
          </ng-template>

          <ng-template po-table-column-template [p-property]="'update'" let-value let-row="row">
            <po-checkbox name="update_{{row.id}}" [(ngModel)]="row.update" p-label=" "></po-checkbox>
          </ng-template>

          <ng-template po-table-column-template [p-property]="'delete'" let-value let-row="row">
            <po-checkbox name="delete_{{row.id}}" [(ngModel)]="row.delete" p-label=" "></po-checkbox>
          </ng-template>

        </po-table>
      </div>
    </div>
  </form>
  
</po-page-edit>
