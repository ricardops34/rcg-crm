<po-page-slide #pageSlide p-title="Meu Perfil" [p-click-out]="true" (p-close)="closeProfile()">

  <po-loading-overlay [p-screen-lock]="true" *ngIf="isLoading"></po-loading-overlay>

  <div class="po-row">
    <div class="po-md-2 po-text-center">
      <po-avatar p-size="xl" [p-src]="user.avatar || 'assets/avatar/avatar_00.png'"></po-avatar>
      <po-button class="po-mt-1" p-label="Trocar Foto" (p-click)="openAvatarSelection()">
      </po-button>
    </div>

    <div class="po-md-10">
      <div class="po-row">
        <po-input class="po-md-6" name="name" [(ngModel)]="user.name" p-label="Nome de Exibição" p-required></po-input>
        <po-input class="po-md-6" name="email" [(ngModel)]="user.email" p-label="E-mail" p-required></po-input>
      </div>
      <div class="po-row">
        <po-info class="po-md-6" p-label="Login (Não alterável)" [p-value]="user.login"></po-info>
        <po-info class="po-md-6" p-label="Unidade" [p-value]="user.unit?.name"></po-info>
      </div>
    </div>
  </div>

  <po-divider p-label="Alterar Senha"></po-divider>

  <div class="po-row">
    <po-password class="po-md-4" name="newPassword" [(ngModel)]="passwordData.new" p-label="Nova Senha"></po-password>
    <po-password class="po-md-4" name="confirmPassword" [(ngModel)]="passwordData.confirm"
      p-label="Confirmar Nova Senha"></po-password>
  </div>

  <div class="po-row po-mt-2">
    <p class="po-font-text-smaller po-md-12 po-text-color-07">
      * Deixe os campos de senha vazios se não desejar alterá-la.
    </p>
  </div>

  <po-page-slide-footer>
    <po-button p-label="Salvar Alterações" p-kind="primary" [p-disabled]="isLoading" (p-click)="saveProfile()">
    </po-button>
  </po-page-slide-footer>

</po-page-slide>

  <po-modal #avatarModal p-title="Selecione seu Avatar" p-size="lg">
    <div class="po-row" style="justify-content: center; gap: 16px;">
      @for (avatar of availableAvatars; track avatar) {
      <div (click)="selectAvatar(avatar)"
        style="cursor: pointer; border-radius: 50%; padding: 4px; border: 2px solid transparent; transition: border 0.2s"
        onmouseover="this.style.borderColor='var(--color-brand-01)'" onmouseout="this.style.borderColor='transparent'">
        <po-avatar p-size="md" [p-src]="avatar"></po-avatar>
      </div>
      }
    </div>
  </po-modal>
