<po-page-default p-title="Painel de B.I. Comercial" [p-actions]="pageActions">

  <po-loading-overlay *ngIf="isLoading"></po-loading-overlay>

  <!-- Filtros -->
  <div class="po-row">
    <po-select 
      class="po-md-2" 
      name="year" 
      p-label="Ano" 
      [p-options]="years" 
      [ngModel]="selectedYear" 
      (p-change)="selectedYear = $event; loadAllData()">
    </po-select>

    <po-select 
      class="po-md-2" 
      name="month" 
      p-label="Mês" 
      [p-options]="months" 
      [ngModel]="selectedMonth" 
      (p-change)="selectedMonth = $event; loadAllData()">
    </po-select>

    <po-select 
      *ngIf="isGerente"
      class="po-md-4" 
      name="vendedor" 
      p-label="Vendedor (Visão Hierárquica)" 
      [p-options]="vendedores" 
      [ngModel]="selectedVendedor" 
      (p-change)="selectedVendedor = $event; loadAllData()"
      p-placeholder="Todos da minha equipe">
    </po-select>
  </div>

  <po-divider></po-divider>

  <!-- KPIs -->
  <div class="po-row">
    <po-widget class="po-md-4 po-mb-2" p-title="Meta do Mês">
      <div class="po-font-subtitle po-text-center po-py-2">
        <po-icon p-icon="po-icon-target" class="po-mr-1"></po-icon>
        {{ summary?.goal | currency:'BRL' }}
      </div>
    </po-widget>

    <po-widget class="po-md-4 po-mb-2" p-title="Realizado">
      <div class="po-font-subtitle po-text-center po-py-2">
        <po-icon p-icon="po-icon-finance" class="po-mr-1"></po-icon>
        {{ summary?.realized | currency:'BRL' }}
      </div>
    </po-widget>

    <po-widget class="po-md-4 po-mb-2" p-title="Atingimento (%)" [p-primary]="true">
      <div class="po-font-subtitle po-text-center po-py-2" [ngClass]="{'po-text-color-07': (summary?.achievement || 0) < 80, 'po-text-color-10': (summary?.achievement || 0) >= 100}">
        <po-icon [p-icon]="(summary?.achievement || 0) >= 100 ? 'po-icon-ok' : 'po-icon-chart-line'" class="po-mr-1"></po-icon>
        {{ summary?.achievement | number:'1.1-2' }}%
      </div>
    </po-widget>
  </div>

  <!-- Gráficos -->
  <div class="po-row">
    <po-widget class="po-md-12 po-mt-2 po-mb-2" p-title="Vendas por Categoria">
      <po-chart 
        [p-series]="categorySeries" 
        [p-type]="chartType"
        [p-height]="350">
      </po-chart>
    </po-widget>
  </div>

  <po-divider p-label="Média de Vendas Mensal (MCV)"></po-divider>

  <!-- Lista MCV Integrada -->
  <div class="po-row">
    <div class="po-md-12">
      <po-table
        [p-columns]="mvcColumns"
        [p-items]="mvcItems"
        [p-actions]="mvcActions"
        p-container="shadow"
        [p-striped]="true"
        [p-sort]="true">
      </po-table>
    </div>
  </div>

</po-page-default>
