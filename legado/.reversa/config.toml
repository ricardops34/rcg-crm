# Reversa — Configuração do Projeto
# Este arquivo é gerenciado pelo instalador. Para customizações, edite config.user.toml

[project]
name = "rcg"
version = "1.0.0"

[user]
name = "Ricardo"
chat_language = "pt-br"
doc_language = "Português"

[output]
folder = "_reversa_sdd"

[agents]
installed = [
  "reversa",
  "reversa-scout",
  "reversa-archaeologist",
  "reversa-detective",
  "reversa-architect",
  "reversa-writer",
  "reversa-reviewer",
  "reversa-visor",
  "reversa-data-master",
  "reversa-design-system",
  "reversa-agents-help",
  "reversa-reconstructor",
  "reversa-migrate",
  "reversa-paradigm-advisor",
  "reversa-curator",
  "reversa-strategist",
  "reversa-designer",
  "reversa-screen-translator",
  "reversa-inspector",
  "reversa-forward",
  "reversa-requirements",
  "reversa-clarify",
  "reversa-plan",
  "reversa-to-do",
  "reversa-audit",
  "reversa-quality",
  "reversa-coding",
  "reversa-principles",
  "reversa-resume",
  "reversa-pricing-profile",
  "reversa-pricing-size",
  "reversa-pricing-estimate"
]

[engines]
installed = [
  "codex",
  "gemini-cli",
  "antigravity",
  "opencode"
]

[analysis]
answer_mode = "chat"
doc_level = "completo"

# Organização das specs geradas pelos agentes.
# Esta seção é preenchida pelo Reversa após o Scout sugerir uma estrutura
# e o usuário confirmar a escolha no menu (logo após a pergunta de doc_level).
# Para reapresentar o menu, remova a seção [specs] inteira e rode o Reversa de novo.
[specs]
layout = "feature-folder"
granularity = "module"
custom_folders = []
scout_suggestion = "module"
decided_at = "2026-05-15T10:05:00Z"
